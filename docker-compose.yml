version: "3.9"

services:
  # ─────────────────────────────────────────
  # Neo4j  —  공급망 그래프 저장소
  # ─────────────────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    container_name: risk_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Neo4j Browser (UI)
      - "7687:7687"   # Bolt protocol (드라이버 연결)
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password123}
      NEO4J_PLUGINS: '["apoc"]'                         # APOC 유틸리티 활성화
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "2g"
      NEO4J_dbms_memory_pagecache_size: "512m"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}", "-p", "${NEO4J_PASSWORD:-password123}", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - risk_network

  # ─────────────────────────────────────────
  # PostgreSQL  —  뉴스 원문 / 추출 결과 / 버전 이력
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: risk_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-riskuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-riskpass}
      POSTGRES_DB: ${POSTGRES_DB:-riskdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-riskuser} -d ${POSTGRES_DB:-riskdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - risk_network

  # ─────────────────────────────────────────
  # FastAPI  —  리스크 엔진 API 서버
  # ─────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: risk_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app        # 개발 중 코드 변경 즉시 반영 (hot-reload)
    networks:
      - risk_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

# ─────────────────────────────────────────
# Volumes & Networks
# ─────────────────────────────────────────
volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:
  postgres_data:

networks:
  risk_network:
    driver: bridge
